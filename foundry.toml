[profile.default]
src          = "src"
test         = "test"
script       = "script"
out          = "out"
libs         = ["lib"]
solc_version = "0.8.26"
evm_version  = "cancun"
optimizer    = true
optimizer_runs = 200
via_ir       = true

# Remappings live in remappings.txt so editors / forge-fmt pick them up.

[fmt]
line_length = 120
tab_width   = 4
bracket_spacing = false
int_types   = "long"
